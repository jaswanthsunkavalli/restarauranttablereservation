<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - TableEats</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="logo">🍽️ TableEats</div>
        <ul class="nav-menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="restaurants.html">Restaurants</a></li>
            <li><a href="reservation.html">Book</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <!-- Page Header -->
    <section class="page-header">
        <h1>Contact Us</h1>
        <p>We'd love to hear from you</p>
    </section>

    <!-- Contact Section -->
    <section class="contact">
        <!-- Contact Information -->
        <div class="contact-info">
            <h3>Get in Touch</h3>
            <p>📍 Vijayawada, Andhra Pradesh, India</p>
            <p>📞 +91 98765 43210</p>
            <p>📧 support@tableats.com</p>
            <p>⏰ Available 10 AM - 10 PM IST</p>
        </div>

        <!-- Contact Form -->
        <form class="contact-form" id="contactForm">
            <input type="text" id="contactName" placeholder="Your Name" required>
            <input type="email" id="contactEmail" placeholder="Your Email" required>
            <input type="text" id="contactSubject" placeholder="Subject" required>
            <textarea id="contactMessage" placeholder="Your Message" rows="5" required></textarea>
            <button type="submit" class="btn">Send Message</button>
        </form>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 TableEats. All rights reserved.</p>
    </footer>

    <!-- Scroll to Top Button -->
    <button class="scroll-top" id="scrollToTopBtn">↑ Top</button>

    <script src="script.js"></script>
</body>
</html>
