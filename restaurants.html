<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurants - TableEats</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">🍽️ TableEats</div>
        <ul class="nav-menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="restaurants.html">Restaurants</a></li>
            <li><a href="reservation.html">Book</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>
    <section class="page-header">
        <h1>Nearby Restaurants</h1>
        <p id="locationText">Showing restaurants near Vijayawada</p>
    </section>
    <section class="search">
        <input type="text" id="search" placeholder="🔍 Search by name or cuisine">
        <select id="rating">
            <option>All Ratings</option>
            <option value="4">4+ Stars</option>
            <option value="3">3+ Stars</option>
        </select>
    </section>
    <section class="restaurants">
        <div id="restaurantsGrid" class="grid"></div>
        <div id="noResults" style="display:none">
            <p>No restaurants found. Try adjusting your filters.</p>
        </div>
    </section>
    <footer>
        <p>&copy; 2026 TableEats. All rights reserved.</p>
    </footer>
    <button class="scroll-top" id="scrollToTopBtn">↑ Top</button>

    <script src="script.js"></script>
</body>
</html>
